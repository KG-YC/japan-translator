<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>中日翻譯</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-family: -apple-system, 'Hiragino Sans', 'Noto Sans TC', sans-serif; overflow: hidden; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: #1a1a2e;
      border-bottom: 1px solid #2d2d4e; flex-shrink: 0;
      height: 52px;
    }
    .mode-tabs { display: flex; background: rgba(255,255,255,0.09); border-radius: 20px; padding: 3px; gap: 2px; }
    .mode-tab {
      padding: 6px 18px; border-radius: 16px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      background: transparent; color: #777; transition: all .2s;
    }
    .mode-tab.active { background: white; color: #1a1a2e; }
    .btn-key {
      background: rgba(255,255,255,0.09); border: none; border-radius: 8px;
      padding: 7px 13px; color: #777; font-size: 13px; cursor: pointer; flex-shrink: 0;
    }
    .btn-key.ok { color: #68d391; }
    .lang-header-btn {
      flex: 1; margin: 0 10px; background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18); border-radius: 20px;
      padding: 7px 0; color: #e2e8f0; font-size: 15px; font-weight: 700;
      cursor: pointer; letter-spacing: .5px; transition: background .2s;
    }
    .lang-header-btn.ja { background: rgba(43,108,176,0.35); border-color: rgba(99,179,237,0.4); }

    /* ── Screens ── */
    .screen { display: none; flex-direction: column; height: calc(100vh - 52px); }
    .screen.active { display: flex; }

    /* ════════════════════════════
       對譯模式
    ════════════════════════════ */
    #modeTranslate { background: #111; }
    .panel {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      padding: 14px 18px 22px; overflow: hidden;
    }
    .panel-zh { background: #1a1a2e; }
    .panel-ja { background: #0d1b2a; transform: rotate(180deg); }
    .panel-ja-inner {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: space-between; transform: rotate(180deg);
    }
    .divider { height: 2px; flex-shrink: 0; background: linear-gradient(90deg,transparent,#e94560 30%,#2b6cb0 70%,transparent); }

    .panel-bar { width: 100%; display: flex; align-items: center; justify-content: space-between; }
    .lang-pill { font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
    .panel-zh .lang-pill { background: rgba(233,69,96,.15); color: #e94560; }
    .panel-ja .lang-pill { background: rgba(43,108,176,.2); color: #63b3ed; }
    .btn-kbd { background: rgba(255,255,255,.07); color: #666; border: none; border-radius: 8px; padding: 6px 10px; font-size: 13px; cursor: pointer; }

    .type-wrap { width: 100%; display: none; }
    .type-wrap.open { display: block; }
    .type-box {
      width: 100%; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px; padding: 10px 14px; color: #e2e8f0; font-size: 16px;
      outline: none; resize: none; line-height: 1.5;
    }
    .type-box::placeholder { color: #444; }

    .result-zone { width: 100%; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-height: 0; }
    .result-orig { font-size: 13px; color: #555; text-align: center; word-break: break-all; width: 100%; min-height: 18px; }
    .result-txt { font-size: clamp(20px,5vw,30px); font-weight: 500; line-height: 1.5; text-align: center; color: #f0f0f0; word-break: break-all; }
    .result-txt.dim { font-size: 15px; color: #3a3a55; font-weight: 400; }
    .btn-speak {
      background: rgba(255,255,255,.08); border: none; border-radius: 50px;
      padding: 7px 18px; font-size: 18px; cursor: pointer; flex-shrink: 0;
    }
    .btn-speak:disabled { opacity: .2; }
    .btn-speak.on { background: rgba(255,255,255,.2); animation: blink 1s ease-in-out infinite; }

    .mic-zone { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }
    .mic-btn {
      width: 78px; height: 78px; border-radius: 50%; border: none;
      font-size: 32px; cursor: pointer; transition: transform .1s;
    }
    .mic-btn:active { transform: scale(.92); }
    .panel-zh .mic-btn { background: #e94560; box-shadow: 0 4px 18px rgba(233,69,96,.4); }
    .panel-ja .mic-btn { background: #2b6cb0; box-shadow: 0 4px 18px rgba(43,108,176,.4); }
    .mic-btn.rec { animation: ring-zh 1.2s ease-out infinite; }
    .panel-ja .mic-btn.rec { animation: ring-ja 1.2s ease-out infinite; }
    .mic-lbl { font-size: 12px; font-weight: 600; }
    .panel-zh .mic-lbl { color: #e94560; }
    .panel-ja .mic-lbl { color: #63b3ed; }

    /* ════════════════════════════
       對話模式
    ════════════════════════════ */
    #modeConvo { background: #eef0f4; }

    .chat-log { flex: 1; overflow-y: auto; padding: 14px 14px 6px; display: flex; flex-direction: column; gap: 12px; }
    .chat-log::-webkit-scrollbar { display: none; }

    .msg-pair { display: flex; flex-direction: column; gap: 4px; }
    .brow { display: flex; align-items: center; gap: 8px; }
    .brow.indent { margin-left: 16px; }

    .bubble { padding: 10px 15px; border-radius: 20px; font-size: 16px; line-height: 1.45; max-width: calc(100% - 44px); word-break: break-all; }
    .bubble.orig { background: white; color: #222; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .bubble.xlat { background: #2563eb; color: white; font-weight: 500; }

    .bspeak { flex-shrink: 0; background: none; border: none; font-size: 20px; cursor: pointer; color: #2563eb; padding: 4px; transition: transform .1s; }
    .bspeak:active { transform: scale(.85); }
    .bspeak.on { animation: blink 1s ease-in-out infinite; }

    .loading-bubble { background: white; border-radius: 20px; padding: 12px 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); display: flex; gap: 5px; align-items: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #bbb; animation: bounce 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #bbb; gap: 10px; }
    .chat-empty-icon { font-size: 48px; }

    .chat-status { text-align: center; font-size: 12px; color: #bbb; padding: 4px 0; flex-shrink: 0; }
    .chat-status.live { color: #2563eb; }

    .chat-bar {
      background: white; border-top: 1px solid #dde0e6;
      padding: 10px 14px 22px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .chat-icon-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: #f0f2f5; color: #555; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .lang-indicator { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; background: #f0f2f5; border-radius: 20px; padding: 8px 12px; font-size: 13px; font-weight: 600; color: #444; }
    .mode-toggle-btn { flex: 1; background: #f0f2f5; border: none; border-radius: 20px; padding: 10px 12px; font-size: 13px; font-weight: 700; color: #555; cursor: pointer; transition: all .2s; }
    .mode-toggle-btn.auto-on { background: #16a34a; color: white; }
    .chat-mic {
      width: 54px; height: 54px; border-radius: 50%; border: none;
      background: #2563eb; color: white; font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(37,99,235,.4); flex-shrink: 0; transition: transform .1s;
    }
    .chat-mic:active { transform: scale(.92); }
    .chat-mic.rec { background: #dc2626; box-shadow: 0 3px 12px rgba(220,38,38,.4); animation: ring-red 1.2s ease-out infinite; }

    /* ── API Modal ── */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.72); z-index: 100; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal { background: #1e2a3a; border-radius: 18px; padding: 24px 20px; width: 88%; max-width: 360px; border: 1px solid #2d3f55; }
    .modal h2 { color: #e2e8f0; font-size: 17px; margin-bottom: 8px; }
    .modal p { color: #718096; font-size: 13px; margin-bottom: 16px; line-height: 1.6; }
    .modal a { color: #63b3ed; }
    .modal input { width: 100%; background: #111c2a; border: 1px solid #2d3f55; border-radius: 10px; padding: 13px; color: #e2e8f0; font-size: 15px; outline: none; margin-bottom: 14px; }
    .modal input:focus { border-color: #2563eb; }
    .modal-btns { display: flex; gap: 10px; }
    .btn-save { flex: 1; background: #2563eb; color: white; border: none; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-cancel { background: rgba(255,255,255,.07); color: #a0aec0; border: none; border-radius: 10px; padding: 12px 16px; font-size: 15px; cursor: pointer; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.82); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }

    /* ── Animations ── */
    @keyframes ring-zh {
      0%   { box-shadow: 0 0 0  0   rgba(233,69, 96,.5),0 4px 18px rgba(233,69, 96,.4); }
      70%  { box-shadow: 0 0 0 16px rgba(233,69, 96,0),  0 4px 18px rgba(233,69, 96,.4); }
      100% { box-shadow: 0 0 0  0   rgba(233,69, 96,0),  0 4px 18px rgba(233,69, 96,.4); }
    }
    @keyframes ring-ja {
      0%   { box-shadow: 0 0 0  0   rgba(43,108,176,.5),0 4px 18px rgba(43,108,176,.4); }
      70%  { box-shadow: 0 0 0 16px rgba(43,108,176,0),  0 4px 18px rgba(43,108,176,.4); }
      100% { box-shadow: 0 0 0  0   rgba(43,108,176,0),  0 4px 18px rgba(43,108,176,.4); }
    }
    @keyframes ring-red {
      0%   { box-shadow: 0 0 0  0   rgba(220,38,38,.5),0 3px 12px rgba(220,38,38,.4); }
      70%  { box-shadow: 0 0 0 14px rgba(220,38,38,0),  0 3px 12px rgba(220,38,38,.4); }
      100% { box-shadow: 0 0 0  0   rgba(220,38,38,0),  0 3px 12px rgba(220,38,38,.4); }
    }
    @keyframes blink { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    @keyframes bounce { 0%,80%,100%{transform:scale(.7);opacity:.5} 40%{transform:scale(1);opacity:1} }
    .dots::after { content:''; animation: dotsAnim 1s steps(4,end) infinite; }
    @keyframes dotsAnim { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }
  </style>
</head>
<body style="display:flex;flex-direction:column;height:100%">

<!-- Header -->
<div class="header">
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabT" onclick="switchMode('translate')">對譯</button>
    <button class="mode-tab"        id="tabC" onclick="switchMode('convo')">對話</button>
  </div>
  <button class="lang-header-btn" id="langHeaderBtn" onclick="toggleChatLang()" style="display:none">🇹🇼 中文</button>
  <button class="btn-key" id="keyBtn" onclick="openKeyModal()">Key</button>
</div>

<!-- ══ 對譯模式 ══ -->
<div class="screen active" id="modeTranslate">

  <div class="panel panel-zh">
    <div class="panel-bar">
      <div class="lang-pill">🇹🇼 中文 → 日本語</div>
      <button class="btn-kbd" onclick="toggleKbd('zh')">⌨️</button>
    </div>
    <div class="type-wrap" id="typeZh">
      <textarea class="type-box" id="inputZh" rows="2" placeholder="打字輸入中文…" oninput="onTypeInput('zh')"></textarea>
    </div>
    <div class="result-zone">
      <div class="result-orig" id="origZh"></div>
      <div class="result-txt dim" id="resJa">按下麥克風說中文</div>
      <button class="btn-speak" id="spkJa" onclick="replay('ja')" disabled>🔊</button>
    </div>
    <div class="mic-zone">
      <button class="mic-btn" id="micZh" onclick="toggleTransMic('zh')">🎤</button>
      <div class="mic-lbl" id="lblZh">按下說話</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="panel panel-ja">
    <div class="panel-ja-inner">
      <div class="panel-bar">
        <div class="lang-pill">🇯🇵 日本語 → 中文</div>
        <button class="btn-kbd" onclick="toggleKbd('ja')">⌨️</button>
      </div>
      <div class="type-wrap" id="typeJa">
        <textarea class="type-box" id="inputJa" rows="2" placeholder="日本語を入力…" oninput="onTypeInput('ja')"></textarea>
      </div>
      <div class="result-zone">
        <div class="result-orig" id="origJa"></div>
        <div class="result-txt dim" id="resZh">ボタンを押して話してください</div>
        <button class="btn-speak" id="spkZh" onclick="replay('zh')" disabled>🔊</button>
      </div>
      <div class="mic-zone">
        <button class="mic-btn" id="micJa" onclick="toggleTransMic('ja')">🎤</button>
        <div class="mic-lbl" id="lblJa">ここを押して話す</div>
      </div>
    </div>
  </div>

</div>

<!-- ══ 對話模式 ══ -->
<div class="screen" id="modeConvo">

  <div class="chat-log" id="chatLog">
    <div class="chat-empty" id="chatEmpty">
      <div class="chat-empty-icon">🎤</div>
      <div>按下麥克風開始對話</div>
    </div>
  </div>

  <div class="chat-status" id="chatStatus">按下麥克風說話</div>

  <div class="chat-bar">
    <div style="display:flex;gap:8px">
      <button class="chat-icon-btn" onclick="clearChat()" title="清除">🗑️</button>
      <button class="chat-icon-btn" onclick="openKeyModal()" title="設定">⚙️</button>
      <button class="chat-icon-btn" id="langBtn" onclick="toggleChatLang()" title="切換語言">🇹🇼</button>
      <button class="chat-icon-btn" id="ttsBtn" onclick="toggleAutoTTS()" title="自動播放">🔇</button>
    </div>
    <button class="mode-toggle-btn" id="autoBtn" onclick="toggleChatMode()">🤚 手動</button>
    <button class="chat-mic" id="chatMic" onclick="toggleConvo()">🎤</button>
  </div>

</div>

<!-- API Modal -->
<div class="modal-bg" id="keyModal">
  <div class="modal">
    <h2>🔑 Gemini API Key</h2>
    <p>到 Google AI Studio 取得免費 Key，只存在本機。<br>
       <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a></p>
    <input type="password" id="keyInput" placeholder="AIza…" autocomplete="off">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeKeyModal()">取消</button>
      <button class="btn-save"   onclick="saveKey()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ══════════════════════════════════════════════
// Config
// ══════════════════════════════════════════════
const GEMINI_URL = key =>
  `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

// 對話模式：按下錄音、再按送出（完全不依賴靜音偵測，iOS 最穩定）

const MAX_HISTORY = 6;       // 對話記憶保留句數

// ══════════════════════════════════════════════
// State
// ══════════════════════════════════════════════
let apiKey = localStorage.getItem('gemini_key') || '';

// 對譯
let transRec = null, transDir = null;
let transRecording = { zh: false, ja: false };
let transTranslating = { zh: false, ja: false };
let transLast = { ja: '', zh: '' };
let typeTimer = { zh: null, ja: null };

// 對話
let convoStream = null, convoRec = null, convoReqTimer = null;
let convoRunning = false, convoProcessing = false;
let convoHistory = [];   // [{lang, original, translation}]
let convoQueue = [];     // 待處理 blob 佇列
let lastTranscription = ''; // 去重複用

// 自動模式（Web Speech API interim/final）
let autoMode = false, autoRunning = false;
let autoRecognition = null, chatLang = 'zh'; // 'zh' | 'ja'
let pausingForTTS = false;
let autoTTSEnabled = false; // 預設不自動播放語音

// TTS
let speaking = false;

// ══════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════
addEventListener('load', () => {
  updateKeyBtn();
  if (!apiKey) setTimeout(openKeyModal, 600);

  document.getElementById('inputZh').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); translateText('zh', e.target.value); }
  });
  document.getElementById('inputJa').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); translateText('ja', e.target.value); }
  });
});

// ══════════════════════════════════════════════
// Mode Switch
// ══════════════════════════════════════════════
function switchMode(m) {
  ['translate','convo'].forEach(id => {
    document.getElementById('mode' + id.charAt(0).toUpperCase() + id.slice(1))
      .classList.toggle('active', id === m);
  });
  document.getElementById('tabT').classList.toggle('active', m === 'translate');
  document.getElementById('tabC').classList.toggle('active', m === 'convo');
  document.getElementById('langHeaderBtn').style.display = m === 'convo' ? '' : 'none';
  if (m === 'translate') stopConvo();
}

// ══════════════════════════════════════════════
// ── 對譯模式 ──
// ══════════════════════════════════════════════
function toggleTransMic(dir) {
  if (transRecording[dir]) stopTransMic(dir);
  else startTransMic(dir);
}

function startTransMic(dir) {
  stopSpeech();
  if (!apiKey) { openKeyModal(); return; }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    const mime = bestMime();
    const rec = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
    transRec = rec;
    transDir = dir;
    const chunks = [];
    rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    rec.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(chunks, { type: rec.mimeType || 'audio/mp4' });
      doTranslateAudio(blob, dir);
    };
    rec.start();
    transRecording[dir] = true;
    const btn = document.getElementById(dir === 'zh' ? 'micZh' : 'micJa');
    btn.textContent = '⏹'; btn.classList.add('rec');
    setTransLabel(dir, dir === 'zh' ? '錄音中，再按停止' : '録音中…もう一度で停止');
  }).catch(() => toast('無法存取麥克風，請確認權限'));
}

function stopTransMic(dir) {
  if (transRec && transRec.state !== 'inactive') transRec.stop();
  transRec = null; transDir = null; transRecording[dir] = false;
  const btn = document.getElementById(dir === 'zh' ? 'micZh' : 'micJa');
  btn.textContent = '🎤'; btn.classList.remove('rec');
  setTransLabel(dir, dir === 'zh' ? '按下說話' : 'ここを押して話す');
}

function setTransLabel(dir, t) {
  document.getElementById(dir === 'zh' ? 'lblZh' : 'lblJa').textContent = t;
}

async function doTranslateAudio(blob, dir) {
  if (transTranslating[dir]) return;
  const isZh = dir === 'zh';
  const resEl = document.getElementById(isZh ? 'resJa' : 'resZh');
  transTranslating[dir] = true;
  resEl.className = 'result-txt dots'; resEl.textContent = '辨識中';

  const prompt = isZh
    ? 'You are a Japan travel translator. Transcribe the Mandarin Chinese audio exactly, then translate to natural polite Japanese (desu/masu, travel context). Output ONLY valid JSON: {"original":"Chinese transcription","translation":"Japanese translation"}'
    : 'You are a Japan travel translator. Transcribe the Japanese audio exactly, then translate to Traditional Chinese (travel context). Output ONLY valid JSON: {"original":"Japanese transcription","translation":"Traditional Chinese translation"}';

  try {
    const raw = await callGeminiAudio(blob, prompt);
    let original = '', translation = raw;
    try {
      const j = JSON.parse(raw.match(/\{[\s\S]*\}/)?.[0] || raw);
      original = j.original || ''; translation = j.translation || raw;
    } catch {}

    const origEl = document.getElementById(isZh ? 'origZh' : 'origJa');
    if (origEl) origEl.textContent = original;
    resEl.className = 'result-txt'; resEl.textContent = translation;
    transLast[isZh ? 'ja' : 'zh'] = translation;
    const spkBtn = document.getElementById(isZh ? 'spkJa' : 'spkZh');
    spkBtn.disabled = false;
    speakText(translation, isZh ? 'ja-JP' : 'zh-TW');
  } catch(e) {
    resEl.className = 'result-txt dim';
    resEl.textContent = isZh ? '按下麥克風說中文' : 'ボタンを押して話してください';
    toast('失敗：' + e.message);
  } finally { transTranslating[dir] = false; }
}

async function translateText(dir, text) {
  text = (text || '').trim();
  if (!text || !apiKey || transTranslating[dir]) return;
  const isZh = dir === 'zh';
  const resEl = document.getElementById(isZh ? 'resJa' : 'resZh');
  transTranslating[dir] = true;
  resEl.className = 'result-txt dots'; resEl.textContent = '翻譯中';

  const prompt = isZh
    ? `You are a Japan travel translator. Translate the following Traditional Chinese into natural polite Japanese (desu/masu, travel context). Output ONLY the Japanese translation:\n${text}`
    : `You are a Japan travel translator. Translate the following Japanese into natural Traditional Chinese (travel context). Output ONLY the Traditional Chinese translation:\n${text}`;

  try {
    const out = await callGeminiText(prompt);
    const origEl = document.getElementById(isZh ? 'origZh' : 'origJa');
    if (origEl) origEl.textContent = text;
    resEl.className = 'result-txt'; resEl.textContent = out;
    transLast[isZh ? 'ja' : 'zh'] = out;
    document.getElementById(isZh ? 'spkJa' : 'spkZh').disabled = false;
  } catch(e) {
    resEl.className = 'result-txt dim';
    resEl.textContent = isZh ? '按下麥克風說中文' : 'ボタンを押して話してください';
    toast('翻譯失敗：' + e.message);
  } finally { transTranslating[dir] = false; }
}

function onTypeInput(dir) {
  clearTimeout(typeTimer[dir]);
  const el = document.getElementById(dir === 'zh' ? 'inputZh' : 'inputJa');
  typeTimer[dir] = setTimeout(() => translateText(dir, el.value), 1200);
}

function toggleKbd(dir) {
  const wrap = document.getElementById(dir === 'zh' ? 'typeZh' : 'typeJa');
  wrap.classList.toggle('open');
  if (wrap.classList.contains('open'))
    document.getElementById(dir === 'zh' ? 'inputZh' : 'inputJa').focus();
}

function replay(dir) {
  const t = transLast[dir];
  if (t) speakText(t, dir === 'ja' ? 'ja-JP' : 'zh-TW');
}

// ══════════════════════════════════════════════
// ── 對話模式 ──
// ══════════════════════════════════════════════
// 切換手動/自動模式
function toggleChatMode() {
  autoMode = !autoMode;
  const btn = document.getElementById('autoBtn');
  btn.textContent = autoMode ? '🤖 自動' : '🤚 手動';
  btn.classList.toggle('auto-on', autoMode);
  if (!autoMode && autoRunning) stopAutoSession();
}

// 按下麥克風：手動=按下錄音再按送出；自動=開啟/關閉自動偵測
function toggleConvo() {
  if (autoMode) {
    if (autoRunning) stopAutoSession();
    else startAutoSession();
    return;
  }
  // 手動模式（原本邏輯）
  if (!convoStream) {
    if (!apiKey) { openKeyModal(); return; }
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      convoStream = stream;
      startConvoRec();
    }).catch(() => toast('無法存取麥克風，請確認權限'));
  } else if (convoRunning) {
    stopConvoRec();
  } else {
    startConvoRec();
  }
}

// ── 自動模式 ──
function startAutoSession() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('此瀏覽器不支援語音辨識，請使用 Safari'); return; }
  if (!apiKey) { openKeyModal(); return; }
  autoRunning = true;
  document.getElementById('chatMic').textContent = '⏹';
  document.getElementById('chatMic').classList.add('rec');
  startRecognition();
}

function startRecognition() {
  if (!autoRunning) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  autoRecognition = rec;
  rec.lang = chatLang === 'zh' ? 'zh-TW' : 'ja-JP';
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 1;

  rec.onresult = e => {
    if (speaking) return;
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if (interim) setChatStatus((chatLang === 'zh' ? '🇹🇼 ' : '🇯🇵 ') + interim, true);
    if (final.trim()) handleFinalSpeech(final.trim());
  };

  rec.onerror = e => {
    if (e.error === 'not-allowed') { toast('麥克風權限被拒絕'); stopAutoSession(); }
  };

  rec.onend = () => {
    if (autoRunning && !pausingForTTS) setTimeout(startRecognition, 150);
  };

  try { rec.start(); } catch(e) {}
  setChatStatus(chatLang === 'zh' ? '🇹🇼 等待說話…' : '🇯🇵 話してください…', true);
}

async function handleFinalSpeech(text) {
  if (!text) return;
  setChatStatus('翻譯中…', true);
  const isZh = chatLang === 'zh';
  const prompt = isZh
    ? `Translate this Mandarin Chinese to natural polite Japanese (desu/masu, travel context). Output ONLY the Japanese translation:\n${text}`
    : `Translate this Japanese to natural Traditional Chinese (travel context). Output ONLY the Traditional Chinese translation:\n${text}`;
  try {
    const translation = await callGeminiText(prompt);
    const result = { lang: chatLang, original: text, translation };
    convoHistory.push(result);
    if (convoHistory.length > MAX_HISTORY) convoHistory.shift();
    addChatBubble(result);
    if (autoTTSEnabled) speakText(translation, isZh ? 'ja-JP' : 'zh-TW');
  } catch(e) {
    toast('翻譯失敗：' + e.message);
    setChatStatus(chatLang === 'zh' ? '🇹🇼 等待說話…' : '🇯🇵 話してください…', true);
  }
}

function updateLangBtns() {
  const isZh = chatLang === 'zh';
  document.getElementById('langBtn').textContent = isZh ? '🇹🇼' : '🇯🇵';
  const hBtn = document.getElementById('langHeaderBtn');
  hBtn.textContent = isZh ? '🇹🇼 中文' : '🇯🇵 日本語';
  hBtn.classList.toggle('ja', !isZh);
}

function toggleAutoTTS() {
  autoTTSEnabled = !autoTTSEnabled;
  document.getElementById('ttsBtn').textContent = autoTTSEnabled ? '🔊' : '🔇';
  toast(autoTTSEnabled ? '自動播放已開啟' : '自動播放已關閉');
}

function toggleChatLang() {
  chatLang = chatLang === 'zh' ? 'ja' : 'zh';
  updateLangBtns();
  if (autoRunning && autoRecognition) {
    try { autoRecognition.stop(); } catch(e) {}
  }
  toast(chatLang === 'zh' ? '切換：等待中文輸入' : '切換：日本語入力待ち');
}

function stopAutoSession() {
  autoRunning = false;
  if (autoRecognition) { try { autoRecognition.stop(); } catch(e) {} autoRecognition = null; }
  document.getElementById('chatMic').textContent = '🎤';
  document.getElementById('chatMic').classList.remove('rec');
  setChatStatus('按下麥克風說話', false);
}

function startConvoRec() {
  if (!convoStream) return;
  const mime = bestMime();
  const rec = new MediaRecorder(convoStream, mime ? { mimeType: mime } : {});
  convoRec = rec;
  const chunks = [];

  rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  rec.onstop = () => {
    const blob = new Blob(chunks, { type: rec.mimeType || 'audio/mp4' });
    if (blob.size > 3000) {
      setChatStatus('辨識中…', true);
      enqueueConvoBlob(blob);
    } else {
      setChatStatus('按下麥克風說話', false);
    }
  };

  rec.start();
  convoRunning = true;
  const btn = document.getElementById('chatMic');
  btn.textContent = '⏹'; btn.classList.add('rec');
  setChatStatus('錄音中… 說完再按一次', true);
}

function stopConvoRec() {
  if (convoRec && convoRec.state !== 'inactive') convoRec.stop();
  convoRec = null;
  convoRunning = false;
  const btn = document.getElementById('chatMic');
  btn.textContent = '🎤'; btn.classList.remove('rec');
}

function stopConvo() {
  if (autoRunning) { stopAutoSession(); return; }
  stopConvoRec();
  if (convoStream) { convoStream.getTracks().forEach(t => t.stop()); convoStream = null; }
  setChatStatus('按下麥克風說話', false);
}

// 佇列處理，避免同時送多個 API 請求
function enqueueConvoBlob(blob) {
  convoQueue.push(blob);
  if (!convoProcessing) drainQueue();
}

async function drainQueue() {
  if (convoQueue.length === 0) {
    convoProcessing = false;
    if (convoRunning) setChatStatus('聆聽中…', true);
    return;
  }
  convoProcessing = true;
  const blob = convoQueue.shift();
  await processConvoBlob(blob);
  drainQueue();
}

async function processConvoBlob(blob) {
  // loading 泡泡
  const loader = document.createElement('div');
  loader.className = 'loading-bubble';
  loader.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  document.getElementById('chatEmpty')?.remove();
  document.getElementById('chatLog').appendChild(loader);
  scrollChat();

  // 歷史記錄文字（英文格式，不夾中日文混合）
  const historyLines = convoHistory.map(h =>
    `[${h.lang === 'zh' ? 'ZH' : 'JA'}] ${h.original} → ${h.translation}`
  ).join('\n');

  const prompt =
    `You are a transcription and translation tool, NOT a conversational AI.
Your ONLY job: transcribe exactly what is spoken in the audio, then translate it.
DO NOT generate new dialogue. DO NOT continue the conversation. DO NOT add anything not spoken in the audio.

Context (use ONLY to resolve pronouns like "that one / this / it" — do NOT respond to it):
${historyLines || '(none)'}

Task:
- Detect language: Mandarin Chinese or Japanese.
- If Chinese → translate to polite Japanese (desu/masu, Japan travel context).
- If Japanese → translate to Traditional Chinese.
- If audio is silent, noise, or unclear → set both fields to empty string "".

Output ONLY valid JSON, no other text:
{"lang":"zh or ja","original":"exact transcription or empty","translation":"translation or empty"}`;

  try {
    const raw = await callGeminiAudio(blob, prompt);
    const jsonStr = raw.match(/\{[\s\S]*?\}/)?.[0] || raw;
    const result = JSON.parse(jsonStr);

    loader.remove();

    // 靜音/雜訊 → 略過
    if (!result?.original?.trim()) return;

    // 與上一句完全相同 → 去重複
    if (result.original.trim() === lastTranscription) return;
    lastTranscription = result.original.trim();

    // 存入記憶
    convoHistory.push(result);
    if (convoHistory.length > MAX_HISTORY) convoHistory.shift();

    addChatBubble(result);
    speakText(result.translation, result.lang === 'zh' ? 'ja-JP' : 'zh-TW');

  } catch(e) {
    loader.remove();
    // JSON 解析失敗或 API 錯誤 → 靜默略過，不打擾對話
    console.warn('convo error:', e.message);
  }
}

function addChatBubble(r) {
  const isZhSpk = r.lang === 'zh';
  const pair = document.createElement('div');
  pair.className = 'msg-pair';

  // 原文
  const rOrig = document.createElement('div');
  rOrig.className = 'brow';
  const bOrig = document.createElement('div'); bOrig.className = 'bubble orig'; bOrig.textContent = r.original;
  const sOrig = makeBSpeak(r.original, isZhSpk ? 'zh-TW' : 'ja-JP');
  rOrig.append(bOrig, sOrig);

  // 翻譯
  const rXlat = document.createElement('div');
  rXlat.className = 'brow indent';
  const bXlat = document.createElement('div'); bXlat.className = 'bubble xlat'; bXlat.textContent = r.translation;
  const sXlat = makeBSpeak(r.translation, isZhSpk ? 'ja-JP' : 'zh-TW');
  rXlat.append(bXlat, sXlat);

  pair.append(rOrig, rXlat);
  document.getElementById('chatLog').appendChild(pair);
  scrollChat();
}

function makeBSpeak(text, lang) {
  const b = document.createElement('button');
  b.className = 'bspeak'; b.textContent = '🔊';
  b.onclick = () => speakText(text, lang);
  return b;
}

function scrollChat() {
  const log = document.getElementById('chatLog');
  setTimeout(() => { log.scrollTop = log.scrollHeight; }, 50);
}

function clearChat() {
  if (autoRunning) stopAutoSession();
  stopConvo();
  convoHistory = []; convoQueue = []; lastTranscription = '';
  convoStream = null;
  document.getElementById('chatLog').innerHTML =
    '<div class="chat-empty" id="chatEmpty"><div class="chat-empty-icon">🎤</div><div>按下麥克風開始對話</div></div>';
  setChatStatus('準備就緒', false);
}

function setChatStatus(t, live) {
  const el = document.getElementById('chatStatus');
  el.textContent = t;
  el.className = 'chat-status' + (live ? ' live' : '');
}

// ══════════════════════════════════════════════
// Gemini API
// ══════════════════════════════════════════════
function extractGeminiText(data) {
  // 2.5 Flash 思考模式會產生多個 parts，thought=true 是推理內容，要過濾掉
  const parts = data.candidates?.[0]?.content?.parts || [];
  const text = parts
    .filter(p => !p.thought)
    .map(p => p.text || '')
    .join('\n')
    .replace(/```json\s*/gi, '')
    .replace(/```\s*/g, '')
    .trim();
  return text;
}

async function callGeminiAudio(blob, promptText) {
  if (!apiKey) throw new Error('未設定 API Key');
  const b64 = await blobToB64(blob);
  const mime = blob.type.split(';')[0] || 'audio/mp4';
  const res = await fetch(GEMINI_URL(apiKey), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [
        { inline_data: { mime_type: mime, data: b64 } },
        { text: promptText }
      ]}],
      generationConfig: {
        temperature: 0.1,
        maxOutputTokens: 400,
        thinkingConfig: { thinkingBudget: 0 }
      }
    })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
  const data = await res.json();
  const out = extractGeminiText(data);
  if (!out) throw new Error('空回應');
  return out;
}

async function callGeminiText(promptText) {
  if (!apiKey) throw new Error('未設定 API Key');
  const res = await fetch(GEMINI_URL(apiKey), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: promptText }] }],
      generationConfig: {
        temperature: 0.1,
        maxOutputTokens: 300,
        thinkingConfig: { thinkingBudget: 0 }
      }
    })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
  const data = await res.json();
  const out = extractGeminiText(data);
  if (!out) throw new Error('空回應');
  return out;
}

function blobToB64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onloadend = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

function bestMime() {
  return ['audio/mp4','audio/webm;codecs=opus','audio/webm'].find(t => MediaRecorder.isTypeSupported(t)) || '';
}

// ══════════════════════════════════════════════
// TTS
// ══════════════════════════════════════════════
function speakText(text, lang) {
  if (!window.speechSynthesis || !text) return;
  stopSpeech();
  // 自動模式：TTS 播放時暫停辨識，避免喇叭聲被當成輸入
  if (autoRunning && autoRecognition) {
    pausingForTTS = true;           // 先設旗標，再 stop（onend 會立即觸發）
    try { autoRecognition.stop(); } catch(e) {}
    autoRecognition = null;
  }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = 0.9;
  u.onstart = () => { speaking = true; };
  let ttsGuard;
  const done = () => {
    clearTimeout(ttsGuard);
    speaking = false;
    pausingForTTS = false;
    if (autoRunning) setTimeout(startRecognition, 600);
  };
  u.onend = done; u.onerror = done;
  // iOS 有時不觸發 onend，用字數估算強制保底
  ttsGuard = setTimeout(done, Math.max(3000, text.length * 200));
  speechSynthesis.speak(u);
}

function stopSpeech() {
  if (window.speechSynthesis) speechSynthesis.cancel();
  speaking = false;
}

// ══════════════════════════════════════════════
// API Key Modal
// ══════════════════════════════════════════════
function openKeyModal() {
  document.getElementById('keyInput').value = apiKey;
  document.getElementById('keyModal').classList.add('open');
}
function closeKeyModal() { document.getElementById('keyModal').classList.remove('open'); }
function saveKey() {
  const k = document.getElementById('keyInput').value.trim();
  if (!k) { toast('請輸入 API Key'); return; }
  apiKey = k; localStorage.setItem('gemini_key', k);
  updateKeyBtn(); closeKeyModal(); toast('已儲存 ✓');
}
function updateKeyBtn() {
  const b = document.getElementById('keyBtn');
  b.textContent = apiKey ? '✓' : 'Key';
  b.className = apiKey ? 'btn-key ok' : 'btn-key';
}
document.getElementById('keyModal').addEventListener('click', e => {
  if (e.target === document.getElementById('keyModal')) closeKeyModal();
});

// ══════════════════════════════════════════════
// Toast
// ══════════════════════════════════════════════
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
