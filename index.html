<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>旅遊翻譯</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-family: -apple-system, 'Hiragino Sans', 'Noto Sans TC', sans-serif; overflow: hidden; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: #1a1a2e;
      border-bottom: 1px solid #2d2d4e; flex-shrink: 0;
      height: 52px; gap: 8px;
    }
    .mode-tabs { display: flex; background: rgba(255,255,255,0.09); border-radius: 20px; padding: 3px; gap: 2px; flex-shrink: 0; }
    .mode-tab {
      padding: 6px 14px; border-radius: 16px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: transparent; color: #777; transition: all .2s;
    }
    .mode-tab.active { background: white; color: #1a1a2e; }
    .btn-key {
      background: rgba(255,255,255,0.09); border: none; border-radius: 8px;
      padding: 7px 11px; color: #777; font-size: 13px; cursor: pointer; flex-shrink: 0;
    }
    .btn-key.ok { color: #68d391; }

    /* Language pair selector in header */
    .lang-pair {
      flex: 1; display: flex; align-items: center; gap: 5px; min-width: 0;
    }
    .lang-sel {
      flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
      border-radius: 14px; padding: 6px 6px; color: #e2e8f0; font-size: 13px; font-weight: 600;
      cursor: pointer; text-align: center; min-width: 0;
      -webkit-appearance: none; appearance: none; outline: none;
    }
    .lang-sel option { background: #1e2a3a; color: #e2e8f0; }
    .swap-btn {
      flex-shrink: 0; background: rgba(255,255,255,0.09); border: none;
      border-radius: 50%; width: 28px; height: 28px; color: #aaa;
      font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* ── Screens ── */
    .screen { display: none; flex-direction: column; height: calc(100vh - 52px); }
    .screen.active { display: flex; }

    /* ════════════════════════════
       對譯模式
    ════════════════════════════ */
    #modeTranslate { background: #111; }
    .panel {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      padding: 14px 18px 22px; overflow: hidden;
    }
    .panel-my  { background: #1a1a2e; }
    .panel-their { background: #0d1b2a; transform: rotate(180deg); }
    .panel-their-inner {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: space-between; transform: rotate(180deg);
    }
    .divider { height: 2px; flex-shrink: 0; background: linear-gradient(90deg,transparent,#e94560 30%,#2b6cb0 70%,transparent); }

    .panel-bar { width: 100%; display: flex; align-items: center; justify-content: space-between; }
    .lang-pill { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
    .panel-my .lang-pill    { background: rgba(233,69,96,.15); color: #e94560; }
    .panel-their .lang-pill { background: rgba(43,108,176,.2); color: #63b3ed; }
    .btn-kbd { background: rgba(255,255,255,.07); color: #666; border: none; border-radius: 8px; padding: 6px 10px; font-size: 13px; cursor: pointer; }

    .type-wrap { width: 100%; display: none; }
    .type-wrap.open { display: block; }
    .type-box {
      width: 100%; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px; padding: 10px 14px; color: #e2e8f0; font-size: 16px;
      outline: none; resize: none; line-height: 1.5;
    }
    .type-box::placeholder { color: #444; }

    .result-zone { width: 100%; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-height: 0; }
    .result-orig { font-size: 13px; color: #555; text-align: center; word-break: break-all; width: 100%; min-height: 18px; }
    .result-txt { font-size: clamp(18px,4.5vw,28px); font-weight: 500; line-height: 1.5; text-align: center; color: #f0f0f0; word-break: break-all; }
    .result-txt.dim { font-size: 14px; color: #3a3a55; font-weight: 400; }
    .btn-speak {
      background: rgba(255,255,255,.08); border: none; border-radius: 50px;
      padding: 7px 18px; font-size: 18px; cursor: pointer; flex-shrink: 0;
    }
    .btn-speak:disabled { opacity: .2; }

    .mic-zone { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }
    .mic-btn {
      width: 78px; height: 78px; border-radius: 50%; border: none;
      font-size: 32px; cursor: pointer; transition: transform .1s;
    }
    .mic-btn:active { transform: scale(.92); }
    .panel-my   .mic-btn { background: #e94560; box-shadow: 0 4px 18px rgba(233,69,96,.4); }
    .panel-their .mic-btn { background: #2b6cb0; box-shadow: 0 4px 18px rgba(43,108,176,.4); }
    .mic-btn.rec { animation: ring-my 1.2s ease-out infinite; }
    .panel-their .mic-btn.rec { animation: ring-their 1.2s ease-out infinite; }
    .mic-lbl { font-size: 12px; font-weight: 600; }
    .panel-my   .mic-lbl { color: #e94560; }
    .panel-their .mic-lbl { color: #63b3ed; }

    /* ════════════════════════════
       對話模式
    ════════════════════════════ */
    #modeConvo { background: #eef0f4; }

    .chat-log { flex: 1; overflow-y: auto; padding: 14px 14px 6px; display: flex; flex-direction: column; gap: 12px; }
    .chat-log::-webkit-scrollbar { display: none; }

    .msg-pair { display: flex; flex-direction: column; gap: 4px; }
    .brow { display: flex; align-items: center; gap: 8px; }
    .brow.indent { margin-left: 16px; }

    .bubble { padding: 10px 15px; border-radius: 20px; font-size: 16px; line-height: 1.45; max-width: calc(100% - 44px); word-break: break-all; }
    .bubble.orig { background: white; color: #222; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .bubble.xlat { background: #2563eb; color: white; font-weight: 500; }

    .bspeak { flex-shrink: 0; background: none; border: none; font-size: 20px; cursor: pointer; color: #2563eb; padding: 4px; transition: transform .1s; }
    .bspeak:active { transform: scale(.85); }

    .loading-bubble { background: white; border-radius: 20px; padding: 12px 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); display: flex; gap: 5px; align-items: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #bbb; animation: bounce 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #bbb; gap: 10px; }
    .chat-empty-icon { font-size: 48px; }

    .chat-status { text-align: center; font-size: 12px; color: #bbb; padding: 4px 0; flex-shrink: 0; }
    .chat-status.live { color: #2563eb; }

    .chat-bar {
      background: white; border-top: 1px solid #dde0e6;
      padding: 10px 14px 22px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .chat-icon-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: #f0f2f5; color: #555; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .speak-side-btn {
      flex: 1; background: #f0f2f5; border: none; border-radius: 20px;
      padding: 10px 8px; font-size: 12px; font-weight: 700; color: #555;
      cursor: pointer; transition: all .2s; line-height: 1.3;
    }
    .speak-side-btn.active { background: #1a1a2e; color: white; }
    .mode-toggle-btn { flex: 1; background: #f0f2f5; border: none; border-radius: 20px; padding: 10px 12px; font-size: 13px; font-weight: 700; color: #555; cursor: pointer; transition: all .2s; }
    .mode-toggle-btn.auto-on { background: #16a34a; color: white; }
    .chat-mic {
      width: 54px; height: 54px; border-radius: 50%; border: none;
      background: #2563eb; color: white; font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(37,99,235,.4); flex-shrink: 0; transition: transform .1s;
    }
    .chat-mic:active { transform: scale(.92); }
    .chat-mic.rec { background: #dc2626; box-shadow: 0 3px 12px rgba(220,38,38,.4); animation: ring-red 1.2s ease-out infinite; }

    /* ── API Modal ── */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.72); z-index: 100; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal { background: #1e2a3a; border-radius: 18px; padding: 24px 20px; width: 88%; max-width: 360px; border: 1px solid #2d3f55; }
    .modal h2 { color: #e2e8f0; font-size: 17px; margin-bottom: 8px; }
    .modal p { color: #718096; font-size: 13px; margin-bottom: 16px; line-height: 1.6; }
    .modal a { color: #63b3ed; }
    .modal input { width: 100%; background: #111c2a; border: 1px solid #2d3f55; border-radius: 10px; padding: 13px; color: #e2e8f0; font-size: 15px; outline: none; margin-bottom: 14px; }
    .modal input:focus { border-color: #2563eb; }
    .modal-btns { display: flex; gap: 10px; }
    .btn-save { flex: 1; background: #2563eb; color: white; border: none; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-cancel { background: rgba(255,255,255,.07); color: #a0aec0; border: none; border-radius: 10px; padding: 12px 16px; font-size: 15px; cursor: pointer; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.82); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: normal; max-width: 90vw; text-align: center; word-break: break-word; }
    .toast.show { opacity: 1; }

    /* ── Animations ── */
    @keyframes ring-my {
      0%   { box-shadow: 0 0 0  0   rgba(233,69,96,.5), 0 4px 18px rgba(233,69,96,.4); }
      70%  { box-shadow: 0 0 0 16px rgba(233,69,96,0),  0 4px 18px rgba(233,69,96,.4); }
      100% { box-shadow: 0 0 0  0   rgba(233,69,96,0),  0 4px 18px rgba(233,69,96,.4); }
    }
    @keyframes ring-their {
      0%   { box-shadow: 0 0 0  0   rgba(43,108,176,.5), 0 4px 18px rgba(43,108,176,.4); }
      70%  { box-shadow: 0 0 0 16px rgba(43,108,176,0),  0 4px 18px rgba(43,108,176,.4); }
      100% { box-shadow: 0 0 0  0   rgba(43,108,176,0),  0 4px 18px rgba(43,108,176,.4); }
    }
    @keyframes ring-red {
      0%   { box-shadow: 0 0 0  0   rgba(220,38,38,.5), 0 3px 12px rgba(220,38,38,.4); }
      70%  { box-shadow: 0 0 0 14px rgba(220,38,38,0),  0 3px 12px rgba(220,38,38,.4); }
      100% { box-shadow: 0 0 0  0   rgba(220,38,38,0),  0 3px 12px rgba(220,38,38,.4); }
    }
    @keyframes bounce { 0%,80%,100%{transform:scale(.7);opacity:.5} 40%{transform:scale(1);opacity:1} }
    .dots::after { content:''; animation: dotsAnim 1s steps(4,end) infinite; }
    @keyframes dotsAnim { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }
  </style>
</head>
<body style="display:flex;flex-direction:column;height:100%">

<!-- Header -->
<div class="header">
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabT" onclick="switchMode('translate')">對譯</button>
    <button class="mode-tab"        id="tabC" onclick="switchMode('convo')">對話</button>
  </div>
  <div class="lang-pair">
    <select class="lang-sel" id="myLangSel"    onchange="onLangChange()"></select>
    <button class="swap-btn" onclick="swapLangs()">⇄</button>
    <select class="lang-sel" id="theirLangSel" onchange="onLangChange()"></select>
  </div>
  <button class="btn-key" id="keyBtn" onclick="openKeyModal()">Key</button>
</div>

<!-- ══ 對譯模式 ══ -->
<div class="screen active" id="modeTranslate">

  <!-- My language panel (top, normal orientation — I read it) -->
  <div class="panel panel-my">
    <div class="panel-bar">
      <div class="lang-pill" id="myPill">🇹🇼 中文 → …</div>
      <button class="btn-kbd" onclick="toggleKbd('my')">⌨️</button>
    </div>
    <div class="type-wrap" id="typeMy">
      <textarea class="type-box" id="inputMy" rows="2" placeholder="輸入文字…" oninput="onTypeInput('my')"></textarea>
    </div>
    <div class="result-zone">
      <div class="result-orig" id="origMy"></div>
      <div class="result-txt dim" id="resTheir" id="resTheir">按下麥克風說話</div>
      <button class="btn-speak" id="spkTheir" onclick="replay('their')" disabled>🔊</button>
    </div>
    <div class="mic-zone">
      <button class="mic-btn" id="micMy" onclick="toggleTransMic('my')">🎤</button>
      <div class="mic-lbl" id="lblMy">按下說話</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Their language panel (bottom, rotated — they read it across the table) -->
  <div class="panel panel-their">
    <div class="panel-their-inner">
      <div class="panel-bar">
        <div class="lang-pill" id="theirPill">🇯🇵 日本語 → …</div>
        <button class="btn-kbd" onclick="toggleKbd('their')">⌨️</button>
      </div>
      <div class="type-wrap" id="typeTheir">
        <textarea class="type-box" id="inputTheir" rows="2" placeholder="Type here…" oninput="onTypeInput('their')"></textarea>
      </div>
      <div class="result-zone">
        <div class="result-orig" id="origTheir"></div>
        <div class="result-txt dim" id="resMy">Press mic to speak</div>
        <button class="btn-speak" id="spkMy" onclick="replay('my')" disabled>🔊</button>
      </div>
      <div class="mic-zone">
        <button class="mic-btn" id="micTheir" onclick="toggleTransMic('their')">🎤</button>
        <div class="mic-lbl" id="lblTheir">Tap to speak</div>
      </div>
    </div>
  </div>

</div>

<!-- ══ 對話模式 ══ -->
<div class="screen" id="modeConvo">

  <div class="chat-log" id="chatLog">
    <div class="chat-empty" id="chatEmpty">
      <div class="chat-empty-icon">🎤</div>
      <div>按下麥克風開始對話</div>
    </div>
  </div>

  <div class="chat-status" id="chatStatus">按下麥克風說話</div>

  <div class="chat-bar">
    <div style="display:flex;gap:6px;flex-shrink:0">
      <button class="chat-icon-btn" onclick="clearChat()" title="清除">🗑️</button>
      <button class="chat-icon-btn" onclick="openKeyModal()" title="設定">⚙️</button>
      <button class="chat-icon-btn" id="ttsBtn" onclick="toggleAutoTTS()" title="自動播放">🔇</button>
    </div>
    <button class="speak-side-btn active" id="speakMySideBtn" onclick="setSpeakSide('my')">
      <div id="speakMySideLbl">🇹🇼 我說</div>
    </button>
    <button class="speak-side-btn" id="speakTheirSideBtn" onclick="setSpeakSide('their')">
      <div id="speakTheirSideLbl">🇯🇵 對方說</div>
    </button>
    <button class="mode-toggle-btn" id="autoBtn" onclick="toggleChatMode()">🤚 手動</button>
    <button class="chat-mic" id="chatMic" onclick="toggleConvo()">🎤</button>
  </div>

</div>

<!-- API Modal -->
<div class="modal-bg" id="keyModal">
  <div class="modal">
    <h2>🔑 Gemini API Key</h2>
    <p>到 Google AI Studio 取得免費 Key，只存在本機。<br>
       <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a></p>
    <input type="password" id="keyInput" placeholder="AIza…" autocomplete="off">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeKeyModal()">取消</button>
      <button class="btn-save"   onclick="saveKey()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ══════════════════════════════════════════════
// Language Config
// ══════════════════════════════════════════════
const LANGS = {
  zh: { name: '中文',        flag: '🇹🇼', bcp47: 'zh-TW' },
  en: { name: 'English',    flag: '🇺🇸', bcp47: 'en-US' },
  ja: { name: '日本語',      flag: '🇯🇵', bcp47: 'ja-JP' },
  ko: { name: '한국어',      flag: '🇰🇷', bcp47: 'ko-KR' },
  fr: { name: 'Français',   flag: '🇫🇷', bcp47: 'fr-FR' },
  th: { name: 'ภาษาไทย',    flag: '🇹🇭', bcp47: 'th-TH' },
  id: { name: 'Indonesia',  flag: '🇮🇩', bcp47: 'id-ID' },
  vi: { name: 'Tiếng Việt', flag: '🇻🇳', bcp47: 'vi-VN' },
};

// Travel-context translation notes per target language
const LANG_NOTES = {
  ja: 'Use polite Japanese (です/ます form). Warm and natural — not stiff or formal business Japanese. Think restaurant ordering, hotel check-in, shopping, asking directions.',
  ko: 'Use polite Korean (-요/-습니다 endings). Natural and friendly for travel.',
  th: 'Use natural Thai with polite particles (ค่ะ as default). Casual and friendly for travel.',
  fr: 'Use polite but natural French (vous when addressing staff/strangers). Casual travel tone.',
  id: 'Use natural, friendly Indonesian (Bahasa Indonesia). Clear and approachable.',
  vi: 'Use natural, polite Vietnamese suitable for talking to locals.',
  zh: 'Use natural Traditional Chinese (繁體中文). Casual and clear.',
  en: 'Use natural, friendly English. Casual tone for travel situations.',
};

const GEMINI_URL = key =>
  `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

const MAX_HISTORY = 6;

// ══════════════════════════════════════════════
// State
// ══════════════════════════════════════════════
let apiKey   = localStorage.getItem('gemini_key') || '';
let myLang   = localStorage.getItem('my_lang')    || 'zh';
let theirLang = localStorage.getItem('their_lang') || 'ja';

// 對譯
let transRec = null;
let transRecording   = { my: false, their: false };
let transTranslating = { my: false, their: false };
let transLast = { my: '', their: '' };
let typeTimer = { my: null, their: null };

// 對話
let convoStream = null, convoRec = null;
let convoRunning = false, convoProcessing = false;
let convoHistory = [];
let convoQueue = [];
let lastTranscription = '';

// 自動模式
let autoMode = false, autoRunning = false;
let autoRecognition = null;
let speakSide = 'my'; // 'my' | 'their' — which side is currently speaking
let pausingForTTS = false;
let autoTTSEnabled = false;

// TTS
let speaking = false;

// ══════════════════════════════════════════════
// Prompt Builders
// ══════════════════════════════════════════════
function buildTextPrompt(text, srcCode, tgtCode) {
  const src = LANGS[srcCode].name;
  const tgt = LANGS[tgtCode].name;
  const note = LANG_NOTES[tgtCode] || '';
  return `You are a casual travel assistant helping tourists communicate with locals.
Translate the following ${src} text to ${tgt} for real travel situations (restaurant ordering, hotel check-in, shopping, asking directions, small talk).
${note}
Output ONLY the translated text — no explanations, no alternatives, no notes.

Text: ${text}`;
}

function buildAudioPrompt(srcCode, tgtCode) {
  const src = LANGS[srcCode].name;
  const tgt = LANGS[tgtCode].name;
  const note = LANG_NOTES[tgtCode] || '';
  return `You are a travel translator. Transcribe the ${src} audio exactly, then translate to ${tgt} for travel situations.
${note}
If audio is silent or unclear, use empty strings.
Output ONLY valid JSON (no other text): {"original":"transcription or empty","translation":"translation or empty"}`;
}

function buildConvoPrompt(historyLines) {
  const myName    = LANGS[myLang].name;
  const theirName = LANGS[theirLang].name;
  const myNote    = LANG_NOTES[myLang] || '';
  const theirNote = LANG_NOTES[theirLang] || '';
  return `You are a real-time travel interpreter. Transcribe exactly what is spoken — do NOT add dialogue or continue the conversation.

Context (recent conversation):
${historyLines || '(none)'}

Task:
- Detect which language is spoken: "${myLang}" (${myName}) or "${theirLang}" (${theirName}).
- Translate to the other language for casual travel situations.
- If translating to ${myName}: ${myNote}
- If translating to ${theirName}: ${theirNote}
- If audio is silent, noise, or unclear → set both fields to empty string "".

Output ONLY valid JSON (no other text):
{"lang":"${myLang} or ${theirLang}","original":"exact transcription or empty","translation":"translation or empty"}`;
}

// ══════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════
addEventListener('load', () => {
  buildLangSelects();
  updateAllUI();
  updateKeyBtn();
  if (!apiKey) setTimeout(openKeyModal, 600);

  document.getElementById('inputMy').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); translateText('my', e.target.value); }
  });
  document.getElementById('inputTheir').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); translateText('their', e.target.value); }
  });
});

function buildLangSelects() {
  const opts = Object.entries(LANGS).map(([k, v]) =>
    `<option value="${k}">${v.flag} ${v.name}</option>`
  ).join('');
  document.getElementById('myLangSel').innerHTML = opts;
  document.getElementById('theirLangSel').innerHTML = opts;
  document.getElementById('myLangSel').value = myLang;
  document.getElementById('theirLangSel').value = theirLang;
}

function onLangChange() {
  myLang    = document.getElementById('myLangSel').value;
  theirLang = document.getElementById('theirLangSel').value;
  localStorage.setItem('my_lang', myLang);
  localStorage.setItem('their_lang', theirLang);
  updateAllUI();
  // Reset stored translations when language changes
  transLast = { my: '', their: '' };
  document.getElementById('origMy').textContent = '';
  document.getElementById('origTheir').textContent = '';
  document.getElementById('resTheir').className = 'result-txt dim';
  document.getElementById('resTheir').textContent = getIdleLbl('their');
  document.getElementById('resMy').className = 'result-txt dim';
  document.getElementById('resMy').textContent = getIdleLbl('my');
  document.getElementById('spkTheir').disabled = true;
  document.getElementById('spkMy').disabled = true;
  if (autoRunning) stopAutoSession();
}

function swapLangs() {
  [myLang, theirLang] = [theirLang, myLang];
  localStorage.setItem('my_lang', myLang);
  localStorage.setItem('their_lang', theirLang);
  document.getElementById('myLangSel').value = myLang;
  document.getElementById('theirLangSel').value = theirLang;
  onLangChange();
}

function updateAllUI() {
  const my    = LANGS[myLang];
  const their = LANGS[theirLang];

  // Panel pills
  document.getElementById('myPill').textContent    = `${my.flag} ${my.name} → ${their.name}`;
  document.getElementById('theirPill').textContent = `${their.flag} ${their.name} → ${my.name}`;

  // Panel labels

  document.getElementById('lblTheir').textContent = getIdleLbl('their');

  // Input placeholders

  document.getElementById('speakTheirSideLbl').textContent = `${their.flag} 對方說`;
}

function getIdleLbl(side) {
  const lang = side === 'my' ? myLang : theirLang;
  const idlePhrases = {
    zh: '按下說話', en: 'Tap to speak', ja: '話す', ko: '말하기',

  };

function getRecLbl(side) {
  const lang = side === 'my' ? myLang : theirLang;
  const recPhrases = {
    zh: '錄音中，再按停止', en: 'Recording… tap to stop', ja: '録音中…もう一度で停止',
    ko: '녹음 중… 다시 누르면 종료', fr: 'Enregistrement… appuyer pour arrêter',

  };
  return recPhrases[lang] || 'Recording… tap to stop';

// ══════════════════════════════════════════════
// Mode Switch
// ══════════════════════════════════════════════
function switchMode(m) {
  document.getElementById('modeTranslate').classList.toggle('active', m === 'translate');
  document.getElementById('modeConvo').classList.toggle('active', m === 'convo');
  document.getElementById('tabT').classList.toggle('active', m === 'translate');
  document.getElementById('tabC').classList.toggle('active', m === 'convo');

// ══════════════════════════════════════════════
// ── 對譯模式 ──
// ══════════════════════════════════════════════
function toggleTransMic(side) {
  if (transRecording[side]) stopTransMic(side);
  else startTransMic(side);
}

function startTransMic(side) {
  stopSpeech();
  if (!apiKey) { openKeyModal(); return; }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    const mime = bestMime();
    const rec = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
    transRec = rec;
    const chunks = [];
    rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    rec.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(chunks, { type: rec.mimeType || 'audio/mp4' });
      doTranslateAudio(blob, side);
    };
    rec.start();
    transRecording[side] = true;
    const btn = document.getElementById(side === 'my' ? 'micMy' : 'micTheir');
    btn.textContent = '⏹'; btn.classList.add('rec');
    document.getElementById(side === 'my' ? 'lblMy' : 'lblTheir').textContent = getRecLbl(side);
  }).catch(() => toast('無法存取麥克風，請確認權限'));
}

function stopTransMic(side) {
  if (transRec && transRec.state !== 'inactive') transRec.stop();
  transRec = null; transRecording[side] = false;
  const btn = document.getElementById(side === 'my' ? 'micMy' : 'micTheir');
  btn.textContent = '🎤'; btn.classList.remove('rec');
  document.getElementById(side === 'my' ? 'lblMy' : 'lblTheir').textContent = getIdleLbl(side);
}

async function doTranslateAudio(blob, side) {
  if (transTranslating[side]) return;
  const srcCode = side === 'my' ? myLang : theirLang;
  const tgtCode = side === 'my' ? theirLang : myLang;
  const resEl   = document.getElementById(side === 'my' ? 'resTheir' : 'resMy');
  transTranslating[side] = true;
  resEl.className = 'result-txt dots'; resEl.textContent = '辨識中';

  try {
    const raw = await callGeminiAudio(blob, buildAudioPrompt(srcCode, tgtCode));
    let original = '', translation = raw;
    try {
      const j = JSON.parse(raw.match(/\{[\s\S]*\}/)?.[0] || raw);
      original = j.original || ''; translation = j.translation || raw;
    } catch {}

    document.getElementById(side === 'my' ? 'origMy' : 'origTheir').textContent = original;
    resEl.className = 'result-txt'; resEl.textContent = translation;
    transLast[side === 'my' ? 'their' : 'my'] = translation;
    document.getElementById(side === 'my' ? 'spkTheir' : 'spkMy').disabled = false;
    speakText(translation, LANGS[tgtCode].bcp47);
  } catch(e) {
    resEl.className = 'result-txt dim';
    resEl.textContent = getIdleLbl(side === 'my' ? 'their' : 'my');
    toast('失敗：' + e.message);
  } finally { transTranslating[side] = false; }
}

async function translateText(side, text) {
  text = (text || '').trim();
  if (!text || !apiKey || transTranslating[side]) return;
  const srcCode = side === 'my' ? myLang : theirLang;
  const tgtCode = side === 'my' ? theirLang : myLang;
  const resEl   = document.getElementById(side === 'my' ? 'resTheir' : 'resMy');
  transTranslating[side] = true;
  resEl.className = 'result-txt dots'; resEl.textContent = '翻譯中';

  try {
    const out = await callGeminiText(buildTextPrompt(text, srcCode, tgtCode));
    document.getElementById(side === 'my' ? 'origMy' : 'origTheir').textContent = text;
    resEl.className = 'result-txt'; resEl.textContent = out;
    transLast[side === 'my' ? 'their' : 'my'] = out;
    document.getElementById(side === 'my' ? 'spkTheir' : 'spkMy').disabled = false;
  } catch(e) {
    resEl.className = 'result-txt dim';
    resEl.textContent = getIdleLbl(side === 'my' ? 'their' : 'my');
    toast('翻譯失敗：' + e.message);
  } finally { transTranslating[side] = false; }
}

function onTypeInput(side) {
  clearTimeout(typeTimer[side]);
  const el = document.getElementById(side === 'my' ? 'inputMy' : 'inputTheir');
  typeTimer[side] = setTimeout(() => translateText(side, el.value), 1200);
}

function toggleKbd(side) {
  const wrap = document.getElementById(side === 'my' ? 'typeMy' : 'typeTheir');
  wrap.classList.toggle('open');
  if (wrap.classList.contains('open'))
    document.getElementById(side === 'my' ? 'inputMy' : 'inputTheir').focus();
}

function replay(side) {
  const t    = transLast[side];
  const code = side === 'my' ? myLang : theirLang;
  if (t) speakText(t, LANGS[code].bcp47);
}

// ══════════════════════════════════════════════
// ── 對話模式 ──
// ══════════════════════════════════════════════
function setSpeakSide(side) {
  speakSide = side;
  document.getElementById('speakMySideBtn').classList.toggle('active', side === 'my');
  document.getElementById('speakTheirSideBtn').classList.toggle('active', side === 'their');
  if (autoRunning && autoRecognition) {
    try { autoRecognition.stop(); } catch(e) {}
  }
  const langName = LANGS[side === 'my' ? myLang : theirLang].name;
  toast(langName + '…');
}

function toggleChatMode() {
  autoMode = !autoMode;
  const btn = document.getElementById('autoBtn');
  btn.textContent = autoMode ? '🤖 自動' : '🤚 手動';
  btn.classList.toggle('auto-on', autoMode);
  if (!autoMode && autoRunning) stopAutoSession();
}

function toggleConvo() {
  if (autoMode) {
    if (autoRunning) stopAutoSession();
    else startAutoSession();
    return;
  }
  if (!convoStream) {
    if (!apiKey) { openKeyModal(); return; }
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      convoStream = stream;
      startConvoRec();
    }).catch(() => toast('無法存取麥克風，請確認權限'));
  } else if (convoRunning) {
    stopConvoRec();
  } else {
    startConvoRec();
  }
}

// ── 自動模式 ──
function startAutoSession() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('此瀏覽器不支援語音辨識，請使用 Safari'); return; }
  if (!apiKey) { openKeyModal(); return; }
  autoRunning = true;
  document.getElementById('chatMic').textContent = '⏹';
  document.getElementById('chatMic').classList.add('rec');
  startRecognition();
}

function startRecognition() {
  if (!autoRunning) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  autoRecognition = rec;
  const activeLang = speakSide === 'my' ? myLang : theirLang;
  rec.lang = LANGS[activeLang].bcp47;
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 1;

  rec.onresult = e => {
    if (speaking) return;
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    const flag = LANGS[activeLang].flag;
    if (interim) setChatStatus(flag + ' ' + interim, true);
    if (final.trim()) handleFinalSpeech(final.trim(), activeLang);
  };

  rec.onerror = e => {
    if (e.error === 'not-allowed') { toast('麥克風權限被拒絕'); stopAutoSession(); }
  };

  rec.onend = () => {
    if (autoRunning && !pausingForTTS) setTimeout(startRecognition, 150);
  };

  try { rec.start(); } catch(e) {}
  const flag = LANGS[activeLang].flag;
  const name = LANGS[activeLang].name;
  setChatStatus(flag + ' ' + name + ' 等待說話…', true);
}

async function handleFinalSpeech(text, srcCode) {
  if (!text) return;
  setChatStatus('翻譯中…', true);
  const tgtCode = srcCode === myLang ? theirLang : myLang;
  try {
    const translation = await callGeminiText(buildTextPrompt(text, srcCode, tgtCode));
    const result = { lang: srcCode, original: text, translation };
    convoHistory.push(result);
    if (convoHistory.length > MAX_HISTORY) convoHistory.shift();
    addChatBubble(result, tgtCode);
    if (autoTTSEnabled) speakText(translation, LANGS[tgtCode].bcp47);
  } catch(e) {
    toast('翻譯失敗：' + e.message);
    const flag = LANGS[srcCode].flag;
    setChatStatus(flag + ' 等待說話…', true);
  }
}

function toggleAutoTTS() {
  autoTTSEnabled = !autoTTSEnabled;
  document.getElementById('ttsBtn').textContent = autoTTSEnabled ? '🔊' : '🔇';
  toast(autoTTSEnabled ? '自動播放已開啟' : '自動播放已關閉');
}

function stopAutoSession() {
  autoRunning = false;
  if (autoRecognition) { try { autoRecognition.stop(); } catch(e) {} autoRecognition = null; }
  document.getElementById('chatMic').textContent = '🎤';
  document.getElementById('chatMic').classList.remove('rec');
  setChatStatus('按下麥克風說話', false);
}

// ── 手動模式 ──
function startConvoRec() {
  if (!convoStream) return;
  const mime = bestMime();
  const rec = new MediaRecorder(convoStream, mime ? { mimeType: mime } : {});
  convoRec = rec;
  const chunks = [];

  rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  rec.onstop = () => {
    const blob = new Blob(chunks, { type: rec.mimeType || 'audio/mp4' });
    if (blob.size > 3000) {
      setChatStatus('辨識中…', true);
      enqueueConvoBlob(blob);
    } else {
      setChatStatus('按下麥克風說話', false);
    }
  };

  rec.start();
  convoRunning = true;
  const btn = document.getElementById('chatMic');
  btn.textContent = '⏹'; btn.classList.add('rec');
  const flag = LANGS[speakSide === 'my' ? myLang : theirLang].flag;
  setChatStatus(flag + ' 錄音中… 說完再按一次', true);
}

function stopConvoRec() {
  if (convoRec && convoRec.state !== 'inactive') convoRec.stop();
  convoRec = null; convoRunning = false;
  const btn = document.getElementById('chatMic');
  btn.textContent = '🎤'; btn.classList.remove('rec');
}

function stopConvo() {
  if (autoRunning) { stopAutoSession(); return; }
  stopConvoRec();
  if (convoStream) { convoStream.getTracks().forEach(t => t.stop()); convoStream = null; }
  setChatStatus('按下麥克風說話', false);
}

function enqueueConvoBlob(blob) {
  convoQueue.push(blob);
  if (!convoProcessing) drainQueue();
}

async function drainQueue() {
  if (convoQueue.length === 0) {
    convoProcessing = false;
    if (convoRunning) setChatStatus('聆聽中…', true);
    return;
  }
  convoProcessing = true;
  const blob = convoQueue.shift();
  await processConvoBlob(blob);
  drainQueue();
}

async function processConvoBlob(blob) {
  const loader = document.createElement('div');
  loader.className = 'loading-bubble';
  loader.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  document.getElementById('chatEmpty')?.remove();
  document.getElementById('chatLog').appendChild(loader);
  scrollChat();

  const historyLines = convoHistory.map(h =>
    `[${h.lang}] ${h.original} → ${h.translation}`
  ).join('\n');

  try {
    const raw = await callGeminiAudio(blob, buildConvoPrompt(historyLines));
    const jsonStr = raw.match(/\{[\s\S]*?\}/)?.[0] || raw;
    const result = JSON.parse(jsonStr);
    loader.remove();

    if (!result?.original?.trim()) return;
    if (result.original.trim() === lastTranscription) return;
    lastTranscription = result.original.trim();

    const tgtCode = result.lang === myLang ? theirLang : myLang;
    convoHistory.push(result);
    if (convoHistory.length > MAX_HISTORY) convoHistory.shift();
    addChatBubble(result, tgtCode);
    speakText(result.translation, LANGS[tgtCode].bcp47);
  } catch(e) {
    loader.remove();
    console.warn('convo error:', e.message);
  }
}

function addChatBubble(r, tgtCode) {
  const srcCode = r.lang;
  const pair = document.createElement('div');
  pair.className = 'msg-pair';

  const rOrig = document.createElement('div');
  rOrig.className = 'brow';
  const bOrig = document.createElement('div');
  bOrig.className = 'bubble orig'; bOrig.textContent = LANGS[srcCode].flag + ' ' + r.original;
  const sOrig = makeBSpeak(r.original, LANGS[srcCode].bcp47);
  rOrig.append(bOrig, sOrig);

  const rXlat = document.createElement('div');
  rXlat.className = 'brow indent';
  const bXlat = document.createElement('div');
  bXlat.className = 'bubble xlat'; bXlat.textContent = LANGS[tgtCode].flag + ' ' + r.translation;
  const sXlat = makeBSpeak(r.translation, LANGS[tgtCode].bcp47);
  rXlat.append(bXlat, sXlat);

  pair.append(rOrig, rXlat);
  document.getElementById('chatLog').appendChild(pair);
  scrollChat();
}

function makeBSpeak(text, bcp47) {
  const b = document.createElement('button');
  b.className = 'bspeak'; b.textContent = '🔊';
  b.onclick = () => speakText(text, bcp47);
  return b;
}

function scrollChat() {
  const log = document.getElementById('chatLog');
  setTimeout(() => { log.scrollTop = log.scrollHeight; }, 50);
}

function clearChat() {
  if (autoRunning) stopAutoSession();
  stopConvo();
  convoHistory = []; convoQueue = []; lastTranscription = '';
  convoStream = null;
  document.getElementById('chatLog').innerHTML =
    '<div class="chat-empty" id="chatEmpty"><div class="chat-empty-icon">🎤</div><div>按下麥克風開始對話</div></div>';
  setChatStatus('按下麥克風說話', false);
}

function setChatStatus(t, live) {
  const el = document.getElementById('chatStatus');
  el.textContent = t;
  el.className = 'chat-status' + (live ? ' live' : '');
}

// ══════════════════════════════════════════════
// Gemini API
// ══════════════════════════════════════════════
function friendlyApiError(err, status) {
  const msg = err?.message || '';
  if (status === 429 || msg.includes('quota') || msg.includes('exhausted') || msg.includes('RESOURCE_EXHAUSTED'))
    return 'API 配額已用盡，請稍後再試，或至 aistudio.google.com 重新取得 Key';
  if (status === 400 && msg.includes('API_KEY'))
    return 'API Key 無效，請點右上角 Key 按鈕重新設定';
  if (status === 403)
    return 'API Key 沒有權限，請確認 Key 是否正確';
  return msg || `API 錯誤 (HTTP ${status})`;
}

async function callGeminiAudio(blob, promptText) {
  if (!apiKey) throw new Error('未設定 API Key');
  const b64 = await blobToB64(blob);
  const mime = blob.type.split(';')[0] || 'audio/mp4';
  const res = await fetch(GEMINI_URL(apiKey), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [
        { inline_data: { mime_type: mime, data: b64 } },
        { text: promptText }
      ]}],
      generationConfig: { temperature: 0.1, maxOutputTokens: 400 }
    })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(friendlyApiError(e.error, res.status)); }
  const data = await res.json();
  const out = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
  if (!out) throw new Error('空回應');
  return out;
}

async function callGeminiText(promptText) {
  if (!apiKey) throw new Error('未設定 API Key');
  const res = await fetch(GEMINI_URL(apiKey), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: promptText }] }],
      generationConfig: { temperature: 0.1, maxOutputTokens: 300 }
    })
  });
  if (!res.ok) { const e = await res.json(); throw new Error(friendlyApiError(e.error, res.status)); }
  const data = await res.json();
  const out = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
  if (!out) throw new Error('空回應');
  return out;
}

function blobToB64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onloadend = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

function bestMime() {
  return ['audio/mp4','audio/webm;codecs=opus','audio/webm'].find(t => MediaRecorder.isTypeSupported(t)) || '';
}

// ══════════════════════════════════════════════
// TTS
// ══════════════════════════════════════════════
function speakText(text, bcp47) {
  if (!window.speechSynthesis || !text) return;
  stopSpeech();
  if (autoRunning && autoRecognition) {
    pausingForTTS = true;
    try { autoRecognition.stop(); } catch(e) {}
    autoRecognition = null;
  }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = bcp47; u.rate = 0.9;
  u.onstart = () => { speaking = true; };
  let ttsGuard;
  const done = () => {
    clearTimeout(ttsGuard);
    speaking = false; pausingForTTS = false;
    if (autoRunning) setTimeout(startRecognition, 600);
  };
  u.onend = done; u.onerror = done;
  ttsGuard = setTimeout(done, Math.max(3000, text.length * 200));
  speechSynthesis.speak(u);
}

function stopSpeech() {
  if (window.speechSynthesis) speechSynthesis.cancel();
  speaking = false;
}

// ══════════════════════════════════════════════
// API Key Modal
// ══════════════════════════════════════════════
function openKeyModal() {
  document.getElementById('keyInput').value = apiKey;
  document.getElementById('keyModal').classList.add('open');
}
function closeKeyModal() { document.getElementById('keyModal').classList.remove('open'); }
function saveKey() {
  const k = document.getElementById('keyInput').value.trim();
  if (!k) { toast('請輸入 API Key'); return; }
  apiKey = k; localStorage.setItem('gemini_key', k);
  updateKeyBtn(); closeKeyModal(); toast('已儲存 ✓');
}
function updateKeyBtn() {
  const b = document.getElementById('keyBtn');
  b.textContent = apiKey ? '✓' : 'Key';
  b.className = apiKey ? 'btn-key ok' : 'btn-key';
}
document.getElementById('keyModal').addEventListener('click', e => {
  if (e.target === document.getElementById('keyModal')) closeKeyModal();
});

// ══════════════════════════════════════════════
// Toast
// ══════════════════════════════════════════════
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}
